# k8s/moj-servis/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agilni_vjezba
  namespace: agilni1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agilni_vjezba
  template:
    metadata:
      labels:
        app: agilni_vjezba
    spec:
      containers:
      - name: agilni_vjezba
        image: github.com/mirko416/agilni_vjezba:1.0
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
