# k8s/moj-servis/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agilni-vjezba
  namespace: agilni1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agilni-vjezba
  template:
    metadata:
      labels:
        app: agilni-vjezba
    spec:
      containers:
      - name: agilni-vjezba
        image: ghcr.io/mirko416/agilni-vjezba:1.0
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
